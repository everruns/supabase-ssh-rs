<rect x="0" y="0" width="755" height="34" rx="10" fill="#11111b"/>
<rect x="0" y="24" width="755" height="10" fill="#11111b"/>
<circle cx="20" cy="17" r="6" fill="#f38ba8"/>
<circle cx="40" cy="17" r="6" fill="#a6e3a1"/>
<circle cx="60" cy="17" r="6" fill="#f9e2af"/>
<text x="377.5" y="17" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="12" fill="#6c7086">agent@local — ssh supabase.sh</text>
<text class="t l l0" x="22" y="65.0"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#6c7086">ssh </tspan><tspan fill="#89b4fa">supabase.sh</tspan><tspan fill="#cdd6f4"> ls /supabase/docs</tspan></text>
<text class="t l l1" x="22" y="87.0"><tspan fill="#cdd6f4">guides</tspan></text>
<text class="t l l2" x="22" y="109.0"><tspan fill="#cdd6f4">reference</tspan></text>
<text class="t l l3" x="22" y="131.0"></text>
<text class="t l l4" x="22" y="153.0"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#6c7086">ssh </tspan><tspan fill="#89b4fa">supabase.sh</tspan><tspan fill="#cdd6f4"> find /supabase/docs/guides/auth -name '*.md'</tspan></text>
<text class="t l l5" x="22" y="175.0"><tspan fill="#89b4fa">/supabase/docs/guides/auth/passwords.md</tspan></text>
<text class="t l l6" x="22" y="197.0"><tspan fill="#89b4fa">/supabase/docs/guides/auth/rls.md</tspan></text>
<text class="t l l7" x="22" y="219.0"></text>
<text class="t l l8" x="22" y="241.0"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#6c7086">ssh </tspan><tspan fill="#89b4fa">supabase.sh</tspan><tspan fill="#cdd6f4"> grep -ril 'row level security' /supabase/docs</tspan></text>
<text class="t l l9" x="22" y="263.0"><tspan fill="#89b4fa">/supabase/docs/guides/auth/rls.md</tspan></text>
<text class="t l l10" x="22" y="285.0"></text>
<text class="t l l11" x="22" y="307.0"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#6c7086">ssh </tspan><tspan fill="#89b4fa">supabase.sh</tspan><tspan fill="#cdd6f4"> cat /supabase/docs/guides/auth/rls.md</tspan></text>
<text class="t l l12" x="22" y="329.0"><tspan fill="#f9e2af"># Row Level Security</tspan></text>
<text class="t l l13" x="22" y="351.0"><tspan fill="#cdd6f4"></tspan></text>
<text class="t l l14" x="22" y="373.0"><tspan fill="#cdd6f4">Supabase uses PostgreSQL Row Level Security (RLS) to control access to rows in</tspan></text>
<text class="t l l15" x="22" y="395.0"><tspan fill="#cdd6f4">a table. Enable it per table, then write policies that describe who can read or</tspan></text>
<text class="t l l16" x="22" y="417.0"><tspan fill="#cdd6f4">write which rows.</tspan></text>
<text class="t l l17" x="22" y="439.0"><tspan fill="#cdd6f4"></tspan></text>
<text class="t l l18" x="22" y="461.0"><tspan fill="#cdd6f4">```sql</tspan></text>
<text class="t l l19" x="22" y="483.0"><tspan fill="#cdd6f4">alter table profiles enable row level security;</tspan></text>
<text class="t l l20" x="22" y="505.0"><tspan fill="#cdd6f4"></tspan></text>
<text class="t l l21" x="22" y="527.0"><tspan fill="#cdd6f4">create policy "Users can view their own profile"</tspan></text>
<text class="t l l22" x="22" y="549.0"><tspan fill="#cdd6f4">  on profiles for select</tspan></text>
<text class="t l l23" x="22" y="571.0"><tspan fill="#cdd6f4">  using ( auth.uid() = user_id );</tspan></text>
<text class="t l l24" x="22" y="593.0"><tspan fill="#cdd6f4">```</tspan></text>
<text class="t l l25" x="22" y="615.0"><tspan fill="#cdd6f4"></tspan></text>
<text class="t l l26" x="22" y="637.0"><tspan fill="#cdd6f4">Every request through the Data API runs as the authenticated user, so policies</tspan></text>
<text class="t l l27" x="22" y="659.0"><tspan fill="#cdd6f4">are enforced automatically.</tspan></text>
<text class="t l l28" x="22" y="681.0"></text>
<text class="t l l29" x="22" y="703.0"><tspan fill="#a6e3a1">$ </tspan></text>
<rect class="cur l l29" x="40.0" y="695.0" width="9" height="16" rx="1"/>
</svg>
