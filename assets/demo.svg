ction:linear;}@keyframes r13{0%,36.67%{opacity:0}37.07%,94.00%{opacity:1}100%{opacity:0}}.l13{animation:r13 19.50s infinite;animation-timing-function:linear;}@keyframes r14{0%,39.49%{opacity:0}39.89%,94.00%{opacity:1}100%{opacity:0}}.l14{animation:r14 19.50s infinite;animation-timing-function:linear;}@keyframes r15{0%,42.31%{opacity:0}42.71%,94.00%{opacity:1}100%{opacity:0}}.l15{animation:r15 19.50s infinite;animation-timing-function:linear;}@keyframes r16{0%,45.13%{opacity:0}45.53%,94.00%{opacity:1}100%{opacity:0}}.l16{animation:r16 19.50s infinite;animation-timing-function:linear;}@keyframes r17{0%,47.95%{opacity:0}48.35%,94.00%{opacity:1}100%{opacity:0}}.l17{animation:r17 19.50s infinite;animation-timing-function:linear;}@keyframes r18{0%,50.77%{opacity:0}51.17%,94.00%{opacity:1}100%{opacity:0}}.l18{animation:r18 19.50s infinite;animation-timing-function:linear;}@keyframes r19{0%,53.59%{opacity:0}53.99%,94.00%{opacity:1}100%{opacity:0}}.l19{animation:r19 19.50s infinite;animation-timing-function:linear;}@keyframes r20{0%,56.41%{opacity:0}56.81%,94.00%{opacity:1}100%{opacity:0}}.l20{animation:r20 19.50s infinite;animation-timing-function:linear;}@keyframes r21{0%,59.23%{opacity:0}59.63%,94.00%{opacity:1}100%{opacity:0}}.l21{animation:r21 19.50s infinite;animation-timing-function:linear;}@keyframes r22{0%,62.05%{opacity:0}62.45%,94.00%{opacity:1}100%{opacity:0}}.l22{animation:r22 19.50s infinite;animation-timing-function:linear;}@keyframes r23{0%,64.87%{opacity:0}65.27%,94.00%{opacity:1}100%{opacity:0}}.l23{animation:r23 19.50s infinite;animation-timing-function:linear;}@keyframes r24{0%,67.69%{opacity:0}68.09%,94.00%{opacity:1}100%{opacity:0}}.l24{animation:r24 19.50s infinite;animation-timing-function:linear;}@keyframes r25{0%,70.51%{opacity:0}70.91%,94.00%{opacity:1}100%{opacity:0}}.l25{animation:r25 19.50s infinite;animation-timing-function:linear;}@keyframes r26{0%,73.33%{opacity:0}73.73%,94.00%{opacity:1}100%{opacity:0}}.l26{animation:r26 19.50s infinite;animation-timing-function:linear;}@keyframes r27{0%,76.15%{opacity:0}76.55%,94.00%{opacity:1}100%{opacity:0}}.l27{animation:r27 19.50s infinite;animation-timing-function:linear;}@keyframes r28{0%,78.97%{opacity:0}79.37%,94.00%{opacity:1}100%{opacity:0}}.l28{animation:r28 19.50s infinite;animation-timing-function:linear;}@keyframes r29{0%,81.79%{opacity:0}82.19%,94.00%{opacity:1}100%{opacity:0}}.l29{animation:r29 19.50s infinite;animation-timing-function:linear;}@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}.cur{animation:blink 1s steps(1) infinite;fill:#cdd6f4;}</style>
