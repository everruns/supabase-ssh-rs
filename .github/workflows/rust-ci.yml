name: Rust CI

on:
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/rust-ci.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - '.github/workflows/rust-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # bashkit's recursion-depth security test needs a larger thread stack than
  # the default before its own function-depth limit fires.
  RUST_MIN_STACK: '16777216'

defaults:
  run:
    working-directory: crates/supabase-ssh

jobs:
  rust:
    name: Format, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/supabase-ssh

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
